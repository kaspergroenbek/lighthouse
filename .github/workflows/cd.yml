name: dbt CD — Production Deploy

on:
  push:
    branches: [main]

env:
  DBT_PROFILES_DIR: ./dbt
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: LIGHTHOUSE_TRANSFORMER
  SNOWFLAKE_WAREHOUSE: TRANSFORM_WH
  SNOWFLAKE_DATABASE: LIGHTHOUSE_PROD_ANALYTICS
  LIGHTHOUSE_ENV: PROD

jobs:
  dbt-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Install dbt packages
        run: dbt deps
        working-directory: ./dbt

      - name: dbt build (full production)
        run: dbt build --target prod
        working-directory: ./dbt

      - name: dbt test (full production)
        run: dbt test --target prod
        working-directory: ./dbt

      - name: Upload manifest for state comparison
        uses: actions/upload-artifact@v4
        with:
          name: prod-manifest
          path: ./dbt/target/manifest.json
          retention-days: 30
