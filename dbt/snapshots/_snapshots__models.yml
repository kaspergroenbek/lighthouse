version: 2

snapshots:
  - name: snp_customers
    description: >
      SCD Type 2 snapshot of customer records — tracks historical changes
      in customer attributes (name, email, segment, region, status).
      Downstream SCD2 dimensions (dim_customer) reference this snapshot,
      not the staging model directly.
    config:
      schema: SNAPSHOTS
      unique_key: customer_id
      strategy: timestamp
      updated_at: updated_at
    columns:
      - name: customer_id
        description: "Natural key — source system customer identifier"
        tests:
          - not_null
      - name: email
        description: "Customer email address (lowercased in staging)"
      - name: first_name
        description: "Customer first name"
      - name: last_name
        description: "Customer last name"
      - name: segment
        description: "Customer segment classification"
      - name: region
        description: "Geographic region"
      - name: status
        description: "Customer account status"
      - name: updated_at
        description: "Source system last-modified timestamp — used as snapshot strategy column"
        tests:
          - not_null
      - name: dbt_valid_from
        description: "Start of validity period for this snapshot record"
      - name: dbt_valid_to
        description: "End of validity period (NULL = current record)"
      - name: dbt_scd_id
        description: "Unique snapshot record identifier"
      - name: dbt_updated_at
        description: "Timestamp of the snapshot run that produced this record"

  - name: snp_contracts
    description: >
      SCD Type 2 snapshot of contract records — tracks historical changes
      in contract type, status, tariff plan, and end date.
      Downstream SCD2 dimensions (dim_contract) reference this snapshot,
      not the staging model directly.
    config:
      schema: SNAPSHOTS
      unique_key: contract_id
      strategy: timestamp
      updated_at: updated_at
    columns:
      - name: contract_id
        description: "Natural key — source system contract identifier"
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key to customer"
      - name: household_id
        description: "Foreign key to household"
      - name: product_id
        description: "Foreign key to product"
      - name: tariff_plan_id
        description: "Foreign key to tariff plan"
      - name: contract_type
        description: "Type of contract (e.g., energy, service, maintenance)"
      - name: status
        description: "Current contract status (e.g., active, cancelled, expired)"
      - name: start_date
        description: "Contract start date"
      - name: end_date
        description: "Contract end date"
      - name: monthly_amount
        description: "Monthly contract amount"
      - name: updated_at
        description: "Source system last-modified timestamp — used as snapshot strategy column"
        tests:
          - not_null
      - name: dbt_valid_from
        description: "Start of validity period for this snapshot record"
      - name: dbt_valid_to
        description: "End of validity period (NULL = current record)"
      - name: dbt_scd_id
        description: "Unique snapshot record identifier"
      - name: dbt_updated_at
        description: "Timestamp of the snapshot run that produced this record"
