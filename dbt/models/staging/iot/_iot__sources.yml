version: 2

sources:
  - name: iot
    description: "NordHjem IoT telemetry — streaming events"
    database: "{{ env_var('LIGHTHOUSE_RAW_DB', 'LIGHTHOUSE_DEV_RAW') }}"
    schema: IOT
    loaded_at_field: _loaded_at
    freshness:
      warn_after: {count: 10, period: minute}
      error_after: {count: 30, period: minute}
    tables:
      - name: telemetry_events
        description: "Raw semi-structured telemetry events from smart home devices"
        columns:
          - name: device_id
            tests: [not_null]
          - name: event_type
            tests:
              - not_null
              - accepted_values:
                  values: ['energy_reading', 'device_status', 'temperature_reading', 'alert_event']
