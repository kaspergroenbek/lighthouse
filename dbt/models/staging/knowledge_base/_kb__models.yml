version: 2

models:
  - name: stg_kb__documents
    description: "Staged knowledge base document metadata. One row per document."
    columns:
      - name: document_id
        description: "Primary key — document identifier"
        tests:
          - not_null
          - unique
      - name: file_name
        description: "Original file name"
      - name: file_type
        description: "File type (markdown, text)"
      - name: source_path
        description: "Source file path in stage"
      - name: category
        description: "Document category"
        tests:
          - accepted_values:
              values: ['manual', 'procedure', 'policy', 'support_article']
      - name: _loaded_at
        description: "Platform ingestion timestamp"

  - name: stg_kb__chunks
    description: "Staged knowledge base document chunks with document metadata. One row per chunk, joined to documents for title and category."
    columns:
      - name: chunk_id
        description: "Primary key — chunk identifier"
        tests:
          - not_null
          - unique
      - name: document_id
        description: "Foreign key to documents"
        tests:
          - not_null
          - relationships:
              to: ref('stg_kb__documents')
              field: document_id
      - name: chunk_sequence_number
        description: "Chunk sequence within document (1-based)"
      - name: chunk_text
        description: "Chunked text segment (~512 tokens)"
      - name: document_title
        description: "Document file name (from documents table)"
      - name: document_category
        description: "Document category (from documents table)"
      - name: _chunked_at
        description: "Chunking timestamp"
