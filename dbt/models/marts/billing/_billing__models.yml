version: 2

models:
  - name: fct_invoices
    description: "Transaction fact at invoice line item grain. Grain: one row per invoice line item."
    config:
      contract:
        enforced: true
      group: billing
      access: public
    columns:
      - name: invoice_line_sk
        description: "Surrogate key"
        data_type: varchar
        tests: [not_null, unique]
      - name: line_item_id
        description: "Natural key — line item identifier"
        data_type: integer
        tests: [not_null]
      - name: invoice_id
        description: "Invoice identifier"
        data_type: integer
      - name: customer_sk
        description: "FK to dim_customer"
        data_type: varchar
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_sk
          - referential_integrity:
              arguments:
                to: ref('dim_customer')
                field: customer_sk
      - name: household_sk
        description: "FK to dim_household"
        data_type: varchar
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_household')
                field: household_sk
      - name: product_sk
        description: "FK to dim_product"
        data_type: varchar
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_product')
                field: product_sk
      - name: contract_sk
        description: "FK to dim_contract"
        data_type: varchar
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_contract')
                field: contract_sk
      - name: invoice_date_key
        description: "FK to dim_date"
        data_type: integer
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: line_description
        description: "Line item description"
        data_type: varchar
      - name: quantity
        description: "Quantity"
        data_type: number
      - name: unit_price
        description: "Unit price"
        data_type: number
      - name: amount
        description: "Line item amount"
        data_type: number
      - name: tax_amount
        description: "Tax amount"
        data_type: number
      - name: net_amount
        description: "Net amount (amount - tax)"
        data_type: number
      - name: invoice_status
        description: "Invoice status"
        data_type: varchar
      - name: product_category
        description: "Product category"
        data_type: varchar
      - name: revenue_classification
        description: "Revenue classification (hardware, service, bundle, other)"
        data_type: varchar

  - name: fct_payments
    description: "Transaction fact at payment grain. Grain: one row per payment."
    config:
      contract:
        enforced: true
      group: billing
      access: public
    columns:
      - name: payment_sk
        description: "Surrogate key"
        data_type: varchar
        tests: [not_null, unique]
      - name: payment_id
        description: "Natural key — payment identifier"
        data_type: integer
        tests: [not_null]
      - name: invoice_id
        description: "FK to invoice"
        data_type: integer
      - name: customer_sk
        description: "FK to dim_customer"
        data_type: varchar
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_customer')
                field: customer_sk
      - name: household_sk
        description: "FK to dim_household"
        data_type: varchar
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_household')
                field: household_sk
      - name: contract_sk
        description: "FK to dim_contract"
        data_type: varchar
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_contract')
                field: contract_sk
      - name: payment_date_key
        description: "FK to dim_date"
        data_type: integer
        tests:
          - referential_integrity:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: payment_amount
        description: "Payment amount"
        data_type: number
      - name: payment_method
        description: "Payment method (card, bank_transfer)"
        data_type: varchar
      - name: payment_status
        description: "Payment status"
        data_type: varchar
      - name: is_late_payment
        description: "Whether payment was made after due date"
        data_type: boolean

  - name: fct_contract_lifecycle
    description: "Accumulating snapshot at contract grain. Grain: one row per contract."
    config:
      contract:
        enforced: true
      group: billing
      access: public
    columns:
      - name: contract_lifecycle_sk
        description: "Surrogate key"
        data_type: varchar
        tests: [not_null, unique]
      - name: contract_id
        description: "Natural key — contract identifier"
        data_type: integer
        tests: [not_null]
      - name: customer_sk
        description: "FK to dim_customer"
        data_type: varchar
      - name: household_sk
        description: "FK to dim_household"
        data_type: varchar
      - name: product_sk
        description: "FK to dim_product"
        data_type: varchar
      - name: contract_sk
        description: "FK to dim_contract"
        data_type: varchar
      - name: start_date_key
        description: "FK to dim_date (contract start)"
        data_type: integer
      - name: end_date_key
        description: "FK to dim_date (contract end)"
        data_type: integer
      - name: contract_type
        description: "Contract type"
        data_type: varchar
      - name: status
        description: "Current contract status"
        data_type: varchar
      - name: created_at
        description: "Contract creation timestamp"
        data_type: timestamp_ntz
      - name: created_at_milestone
        description: "Creation milestone"
        data_type: timestamp_ntz
      - name: activated_at
        description: "Activation milestone date"
        data_type: date
      - name: renewed_at
        description: "Renewal milestone timestamp"
        data_type: timestamp_ntz
      - name: cancelled_at
        description: "Cancellation milestone timestamp"
        data_type: timestamp_ntz
      - name: contract_duration_days
        description: "Duration in days from start to end/current"
        data_type: integer
      - name: monthly_amount
        description: "Monthly contract amount"
        data_type: number
