version: 2

models:
  - name: dim_customer
    description: "SCD Type 2 customer dimension from snp_customers snapshot. Grain: one row per customer per version."
    config:
      contract:
        enforced: true
      group: customer
      access: public
    columns:
      - name: customer_sk
        description: "Surrogate key (hash of customer_id + valid_from)"
        data_type: varchar
        tests:
          - not_null
          - unique
          - surrogate_key_collision:
              arguments:
                natural_key_columns: ['customer_id', 'valid_from']
          - scd2_no_overlap:
              arguments:
                natural_key: customer_id
      - name: customer_id
        description: "Natural key — OLTP customer identifier"
        data_type: integer
        tests: [not_null]
      - name: email
        description: "Customer email address"
        data_type: varchar
      - name: first_name
        description: "Customer first name"
        data_type: varchar
      - name: last_name
        description: "Customer last name"
        data_type: varchar
      - name: phone
        description: "Customer phone number"
        data_type: varchar
      - name: address
        description: "Customer street address"
        data_type: varchar
      - name: postal_code
        description: "Postal code"
        data_type: varchar
      - name: municipality
        description: "Municipality"
        data_type: varchar
      - name: region
        description: "Nordic region"
        data_type: varchar
      - name: country
        description: "Country code"
        data_type: varchar
      - name: segment
        description: "Customer segment classification"
        data_type: varchar
      - name: status
        description: "Customer account status"
        data_type: varchar
      - name: valid_from
        description: "SCD2 version start timestamp"
        data_type: timestamp_ntz
        tests: [not_null]
      - name: valid_to
        description: "SCD2 version end timestamp (NULL for current)"
        data_type: timestamp_ntz
      - name: is_current
        description: "Whether this is the current version"
        data_type: boolean
        tests: [not_null]

  - name: dim_household
    description: "SCD Type 1 household dimension. Grain: one row per household."
    config:
      contract:
        enforced: true
      group: customer
      access: public
    columns:
      - name: household_sk
        description: "Surrogate key"
        data_type: varchar
        tests:
          - not_null
          - unique
          - surrogate_key_collision:
              arguments:
                natural_key_columns: ['household_id']
      - name: household_id
        description: "Natural key — OLTP household identifier"
        data_type: integer
        tests: [not_null, unique]
      - name: customer_id
        description: "FK to owning customer"
        data_type: integer
        tests: [not_null]
      - name: address
        description: "Household street address"
        data_type: varchar
      - name: postal_code
        description: "Postal code"
        data_type: varchar
      - name: municipality
        description: "Municipality"
        data_type: varchar
      - name: country
        description: "Country code"
        data_type: varchar
      - name: household_type
        description: "Household type (apartment, house, commercial)"
        data_type: varchar
      - name: created_at
        description: "Creation timestamp"
        data_type: timestamp_ntz
      - name: updated_at
        description: "Last update timestamp"
        data_type: timestamp_ntz

  - name: dim_device
    description: "SCD Type 1 device dimension with lifecycle state. Grain: one row per device."
    config:
      contract:
        enforced: true
      group: device
      access: public
    columns:
      - name: device_sk
        description: "Surrogate key"
        data_type: varchar
        tests:
          - not_null
          - unique
          - surrogate_key_collision:
              arguments:
                natural_key_columns: ['device_id']
      - name: device_id
        description: "Natural key — OLTP device identifier"
        data_type: integer
        tests: [not_null, unique]
      - name: device_serial
        description: "Device serial number"
        data_type: varchar
      - name: household_id
        description: "FK to household"
        data_type: integer
      - name: device_type
        description: "Device type (smart_thermostat, energy_meter, etc.)"
        data_type: varchar
      - name: manufacturer
        description: "Device manufacturer"
        data_type: varchar
      - name: model
        description: "Device model"
        data_type: varchar
      - name: firmware_version
        description: "Current firmware version"
        data_type: varchar
      - name: installed_at
        description: "Installation date"
        data_type: date
      - name: lifecycle_state
        description: "Derived lifecycle state (provisioned, active, degraded, inactive, decommissioned)"
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['provisioned', 'active', 'degraded', 'inactive', 'decommissioned']
      - name: created_at
        description: "Creation timestamp"
        data_type: timestamp_ntz
      - name: updated_at
        description: "Last update timestamp"
        data_type: timestamp_ntz

  - name: dim_product
    description: "SCD Type 1 product dimension. Grain: one row per product."
    config:
      contract:
        enforced: true
      group: billing
      access: public
    columns:
      - name: product_sk
        description: "Surrogate key"
        data_type: varchar
        tests:
          - not_null
          - unique
          - surrogate_key_collision:
              arguments:
                natural_key_columns: ['product_id']
      - name: product_id
        description: "Natural key — OLTP product identifier"
        data_type: integer
        tests: [not_null, unique]
      - name: product_name
        description: "Product display name"
        data_type: varchar
      - name: category
        description: "Product category (device, service, bundle)"
        data_type: varchar
      - name: description
        description: "Product description"
        data_type: varchar
      - name: pricing_tier
        description: "Pricing tier classification"
        data_type: varchar
      - name: is_active
        description: "Whether product is currently active"
        data_type: boolean
      - name: created_at
        description: "Creation timestamp"
        data_type: timestamp_ntz
      - name: updated_at
        description: "Last update timestamp"
        data_type: timestamp_ntz

  - name: dim_contract
    description: "SCD Type 2 contract dimension from snp_contracts snapshot. Grain: one row per contract per version."
    config:
      contract:
        enforced: true
      group: billing
      access: public
    columns:
      - name: contract_sk
        description: "Surrogate key (hash of contract_id + valid_from)"
        data_type: varchar
        tests:
          - not_null
          - unique
          - surrogate_key_collision:
              arguments:
                natural_key_columns: ['contract_id', 'valid_from']
          - scd2_no_overlap:
              arguments:
                natural_key: contract_id
      - name: contract_id
        description: "Natural key — OLTP contract identifier"
        data_type: integer
        tests: [not_null]
      - name: customer_id
        description: "FK to customer"
        data_type: integer
      - name: household_id
        description: "FK to household"
        data_type: integer
      - name: product_id
        description: "FK to product"
        data_type: integer
      - name: tariff_plan_id
        description: "FK to tariff plan"
        data_type: integer
      - name: contract_type
        description: "Contract type (residential_energy, commercial_energy)"
        data_type: varchar
      - name: status
        description: "Contract status (active, renewed, cancelled, expired, suspended, service_agreement)"
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['active', 'renewed', 'cancelled', 'expired', 'suspended', 'service_agreement']
      - name: start_date
        description: "Contract start date"
        data_type: date
      - name: end_date
        description: "Contract end date"
        data_type: date
      - name: monthly_amount
        description: "Monthly contract amount"
        data_type: number
      - name: created_at
        description: "Creation timestamp"
        data_type: timestamp_ntz
      - name: updated_at
        description: "Last update timestamp"
        data_type: timestamp_ntz
      - name: valid_from
        description: "SCD2 version start timestamp"
        data_type: timestamp_ntz
        tests: [not_null]
      - name: valid_to
        description: "SCD2 version end timestamp (NULL for current)"
        data_type: timestamp_ntz
      - name: is_current
        description: "Whether this is the current version"
        data_type: boolean
        tests: [not_null]

  - name: dim_date
    description: "Static date dimension from seed. Grain: one row per calendar date."
    config:
      contract:
        enforced: true
      access: public
    columns:
      - name: date_key
        description: "Integer date key (YYYYMMDD)"
        data_type: integer
        tests: [not_null, unique]
      - name: full_date
        description: "Calendar date"
        data_type: date
        tests: [not_null, unique]
      - name: day_of_week
        description: "Day name (Monday, Tuesday, etc.)"
        data_type: varchar
      - name: day_of_week_num
        description: "Day number (1=Monday, 7=Sunday)"
        data_type: integer
      - name: week_number_iso
        description: "ISO week number"
        data_type: integer
      - name: month
        description: "Month number (1-12)"
        data_type: integer
      - name: month_name
        description: "Month name"
        data_type: varchar
      - name: quarter
        description: "Quarter number (1-4)"
        data_type: integer
      - name: year
        description: "Calendar year"
        data_type: integer
      - name: is_weekend
        description: "Whether date falls on weekend"
        data_type: boolean
      - name: is_danish_public_holiday
        description: "Whether date is a Danish public holiday"
        data_type: boolean
      - name: fiscal_year
        description: "Fiscal year"
        data_type: integer
      - name: fiscal_quarter
        description: "Fiscal quarter"
        data_type: integer

  - name: dim_time
    description: "Static time dimension from seed. Grain: one row per minute of day (1440 rows)."
    config:
      contract:
        enforced: true
      access: public
    columns:
      - name: time_key
        description: "Integer time key (minute of day, 0-1439)"
        data_type: integer
        tests: [not_null, unique]
      - name: hour
        description: "Hour (0-23)"
        data_type: integer
      - name: minute
        description: "Minute (0-59)"
        data_type: integer
      - name: time_of_day_band
        description: "Time band (night, morning, afternoon, evening)"
        data_type: varchar
      - name: is_business_hour
        description: "Whether this falls within business hours"
        data_type: boolean

  - name: dim_geography
    description: "SCD Type 1 geography dimension. Grain: one row per postal_code + municipality + country."
    config:
      contract:
        enforced: true
      access: public
    columns:
      - name: geography_sk
        description: "Surrogate key"
        data_type: varchar
        tests:
          - not_null
          - unique
          - surrogate_key_collision:
              arguments:
                natural_key_columns: ['postal_code', 'municipality', 'country']
      - name: postal_code
        description: "Postal code"
        data_type: varchar
        tests: [not_null]
      - name: municipality
        description: "Municipality name"
        data_type: varchar
      - name: region
        description: "Nordic region"
        data_type: varchar
      - name: country
        description: "Country code"
        data_type: varchar

  - name: bridge_household_device
    description: "Bridge table resolving many-to-many household-device assignments. Grain: one row per household-device assignment."
    config:
      contract:
        enforced: true
      group: device
      access: public
    columns:
      - name: household_sk
        description: "FK to dim_household"
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_household')
                field: household_sk
      - name: device_sk
        description: "FK to dim_device"
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_device')
                field: device_sk
      - name: device_id
        description: "Natural device identifier"
        data_type: integer
      - name: household_id
        description: "Natural household identifier"
        data_type: integer
      - name: effective_from
        description: "Assignment start date"
        data_type: date
      - name: effective_to
        description: "Assignment end date (NULL if still active)"
        data_type: timestamp_ntz
